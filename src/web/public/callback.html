<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Authorization - Last.fm Widget</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1e1e2e; color: #cdd6f4; }
  .card { background: #313244; padding: 2rem; border-radius: 12px; text-align: center; max-width: 400px; }
  .spinner { border: 3px solid #585b70; border-top: 3px solid #89b4fa; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 1rem auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #a6e3a1; font-size: 2rem; }
  .error { color: #f38ba8; }
</style>
</head>
<body>
<div class="card">
  <h2>Last.fm Widget</h2>
  <div id="status">
    <div class="spinner"></div>
    <p>Completing authorization...</p>
  </div>
</div>
<script>
  (async () => {
    const params = new URLSearchParams(window.location.hash.replace('#', ''));
    const accessToken = params.get('access_token');
    const state = params.get('state');

    const status = document.getElementById('status');

    if (!accessToken || !state) {
      status.innerHTML = '<p class="error">&#10007; Authorization failed &mdash; missing token or state.</p>';
      return;
    }

    try {
      const res = await fetch('/api/store-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state, access_token: accessToken }),
      });

      if (res.ok) {
        status.innerHTML = '<p class="success">&#10003;</p><p>Authorization successful! You can close this page.</p>';
      } else {
        status.innerHTML = '<p class="error">&#10007; Failed to store token.</p>';
      }
    } catch {
      status.innerHTML = '<p class="error">&#10007; Network error.</p>';
    }
  })();
</script>
</body>
</html>
