<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Last.fm Widget</title>
</head>
<body>
<p id="status">Completing authorization...</p>
<script>
  (async () => {
    const params = new URLSearchParams(window.location.hash.replace('#', ''));
    const accessToken = params.get('access_token');
    const state = params.get('state');
    const status = document.getElementById('status');

    if (!accessToken || !state) {
      status.textContent = 'Authorization failed: missing token or state.';
      return;
    }

    try {
      const res = await fetch('/api/store-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state, access_token: accessToken }),
      });

      status.textContent = res.ok
        ? 'Authorization successful! You may close this page.'
        : 'Authorization failed: could not store token.';
    } catch {
      status.textContent = 'Authorization failed: network error.';
    }
  })();
</script>
</body>
</html>
